version: 2

updates:
  # Update npm packages
  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 10

    # Group into shared PRs
    groups:
      build:
        patterns:
          - '*-loader'
          - '*-webpack-plugin'
          - '@babel/*'
          - 'autoprefixer'
          - 'babel-*'
          - 'core-js'
          - 'cssnano'
          - 'cssnano-*'
          - 'i18next'
          - 'i18next-*'
          - 'postcss'
          - 'postcss-*'
          - 'react'
          - 'react-*'
          - '*-react'
          - 'sass-embedded'
          - 'tsc-alias'
          - 'typescript'
          - 'webpack'
          - 'webpack-*'

        # Exclude packages in other groups
        exclude-patterns:
          - 'eslint-plugin-react'
          - 'eslint-plugin-react-hooks'
          - 'postcss-scss'

      lint:
        patterns:
          - '@typescript-eslint/*'
          - 'editorconfig-checker'
          - 'eslint'
          - 'eslint-*'
          - 'husky'
          - 'lint-staged'
          - 'postcss-scss'
          - 'prettier'
          - 'stylelint'
          - 'stylelint-*'

      logging:
        patterns:
          - '*-pino'
          - '*-pino-format'
          - 'pino'
          - 'pino-*'

      tools:
        patterns:
          - '@testing-library/*'
          - 'cheerio'
          - 'concurrently'
          - 'global-jsdom'
          - 'jest'
          - 'jest-*'
          - 'jsdom'
          - 'nock'
          - 'tsx'

      types:
        patterns:
          - '@types/*'
          - 'oidc-client-ts'

      forms:
        patterns:
          - '@defra/forms-model'
          - '@defra/forms-engine-plugin'

      aws:
        patterns:
          - '@aws-sdk/*'
          - 'aws-embedded-metrics'

      hapi:
        patterns:
          - '@hapi/*'
          - 'blankie'
          - 'blipp'
          - 'hapi-*'
          - '*-hapi'
          - 'joi'

      frontend:
        patterns:
          - '@dagrejs/dagre'
          - '@defra/interactive-map'
          - 'accessible-autocomplete'
          - 'govuk-frontend'
          - 'highlight.js'
          - 'humanize-duration'
          - 'liquidjs'
          - 'nunjucks'
          - 'prismjs'
          - 'svgo'

      runtime:
        patterns:
          - '@defra/hapi-tracing'
          - 'dotenv'
          - 'ioredis'
          - 'js-yaml'
          - 'marked'
          - 'minimatch'
          - 'mongodb'
          - 'yaml'

    # Schedule run every Monday, local time
    schedule:
      interval: weekly
      time: '10:30'
      timezone: 'Europe/London'

    versioning-strategy: increase

    allow:
      # Include direct package.json updates
      - dependency-type: direct

  # Update GitHub Actions
  - package-ecosystem: github-actions
    directory: /

    groups:
      actions:
        patterns:
          - '*'

    # Schedule run every Monday, local time
    schedule:
      interval: weekly
      time: '10:30'
      timezone: 'Europe/London'
